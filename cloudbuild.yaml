steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/srijanspeaks:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/srijanspeaks:latest'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/srijanspeaks:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/srijanspeaks:$SHORT_SHA'
      - '--location=asia-south1'
      - '--name=srijanspeaks'

images:
  - 'gcr.io/$PROJECT_ID/srijanspeaks:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/srijanspeaks:latest'

timeout: '1800s'
