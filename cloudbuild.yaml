steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/srijanspeaks'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/srijanspeaks'

  # Deploy to Cloud Run (using gcloud SDK — gcr.io/cloud-builders/run is deprecated)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'srijanspeaks'
      - '--image'
      - 'gcr.io/$PROJECT_ID/srijanspeaks'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/srijanspeaks'

timeout: '1800s'
# Build machine: e2-medium (default). Increase to e2-highcpu-8 for faster builds.
